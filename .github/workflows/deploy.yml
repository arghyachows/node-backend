name: Deploy to IBM Cloud Code Engine

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IBM_CLOUD_REGION: us-south
  CE_PROJECT: cricket-serverless
  CE_APP: cricket-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine -f

      - name: Authenticate with IBM Cloud
        run: |
          ibmcloud login --apikey "${{ secrets.IBM_CLOUD_API_KEY }}" -r "$IBM_CLOUD_REGION" -g Default
          ibmcloud ce project select --name "$CE_PROJECT"

      - name: Deploy from source
        run: |
          ibmcloud ce app update --name "$CE_APP" --build-source .

      - name: Verify deployment
        run: |
          APP_URL=$(ibmcloud ce app get --name "$CE_APP" --output json | jq -r '.status.url')
          echo "✅ Deployed to: $APP_URL"
          curl -s "$APP_URL/health" || true
