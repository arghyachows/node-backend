name: Deploy to Render

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Lint & basic checks
  # ──────────────────────────────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check app.js

  # ──────────────────────────────────────────────
  # Job 2: Deploy to Render via Deploy Hook
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: ${{ steps.get_url.outputs.service_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger Render Deploy Hook
        id: deploy
        run: |
          echo "🚀 Triggering Render deployment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Response code: $RESPONSE"
          if [[ "$RESPONSE" != 2* ]]; then
            echo "❌ Render deploy hook failed with status $RESPONSE"
            exit 1
          fi
          echo "✅ Render deploy triggered successfully"

      - name: Wait for deployment to complete
        run: |
          echo "⏳ Waiting 60s for Render to build and start..."
          sleep 60

      - name: Health check
        id: get_url
        run: |
          SERVICE_URL="${{ secrets.RENDER_SERVICE_URL }}"
          echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "🏥 Running health check on $SERVICE_URL/health ..."
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              curl -s "$SERVICE_URL/health" | jq .
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after all retries"
          exit 1

      - name: Notify success
        if: success()
        run: |
          echo "🎉 Deployment successful!"
          echo "🌐 Live at: ${{ secrets.RENDER_SERVICE_URL }}"

      - name: Notify failure
        if: failure()
        run: |
          echo "💥 Deployment failed. Check Render dashboard for logs."
          echo "🔗 https://dashboard.render.com"
