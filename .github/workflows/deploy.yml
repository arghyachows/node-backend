name: Deploy to IBM Cloud Code Engine

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IBM_CLOUD_API_KEY: ${{ secrets.IBM_CLOUD_API_KEY }}
  IBM_CLOUD_REGION: us-south
  ICR_NAMESPACE: my_cricket_namespace
  IMAGE_NAME: cricket-backend
  CE_PROJECT: cricket-serverless
  CE_APP: cricket-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install container-registry -f
          ibmcloud plugin install code-engine -f

      - name: Login to IBM Cloud
        run: |
          ibmcloud login --apikey "$IBM_CLOUD_API_KEY" -r "$IBM_CLOUD_REGION" -g Default
          ibmcloud cr region-set "$IBM_CLOUD_REGION"
          ibmcloud cr login

      - name: Build and push Docker image
        run: |
          docker build -t us.icr.io/$ICR_NAMESPACE/$IMAGE_NAME:${{ github.sha }} .
          docker tag us.icr.io/$ICR_NAMESPACE/$IMAGE_NAME:${{ github.sha }} us.icr.io/$ICR_NAMESPACE/$IMAGE_NAME:latest
          docker push us.icr.io/$ICR_NAMESPACE/$IMAGE_NAME:${{ github.sha }}
          docker push us.icr.io/$ICR_NAMESPACE/$IMAGE_NAME:latest

      - name: Deploy to Code Engine
        run: |
          ibmcloud ce project select --name "$CE_PROJECT"
          ibmcloud ce app update \
            --name "$CE_APP" \
            --image us.icr.io/$ICR_NAMESPACE/$IMAGE_NAME:${{ github.sha }}

      - name: Verify deployment
        run: |
          ibmcloud ce app get --name "$CE_APP" --output json | jq '.status.url'
