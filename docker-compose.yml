version: '3.8'

services:
  backend:
    build: .
    container_name: cricket-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - CLOUDFLARE_AI_WORKER_URL=${CLOUDFLARE_AI_WORKER_URL}
      - NODE_ENV=production
      - CORS_ORIGIN=*
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - cricket-network

  redis:
    image: redis:7-alpine
    container_name: cricket-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - cricket-network
    command: redis-server --appendonly yes

networks:
  cricket-network:
    driver: bridge

volumes:
  redis-data:
